name: Expire entitlements

# Daily sweep that downgrades lapsed memberships and fires the
# entitlement.updated webhook to the consuming app. Hits the protected
# Elixpo Pay cron endpoint with the shared CRON_SECRET.
on:
  schedule:
    - cron: "17 2 * * *" # 02:17 UTC daily
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger entitlement expiry
        env:
          ENDPOINT: https://payouts.elixpo.com/api/cron/expire-entitlements
          CRON_SECRET: ${{ secrets.PAYOUTS_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::PAYOUTS_CRON_SECRET repo secret is not set"; exit 1
          fi
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST "$ENDPOINT" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $code"
          cat /tmp/resp.json; echo
          if [ "$code" != "200" ]; then
            echo "::error::Expiry sweep failed (HTTP $code)"; exit 1
          fi
